services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////app/data/app.db"
      BLOCKCHAIN_RPC_URL: "http://host.docker.internal:8545"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data:
